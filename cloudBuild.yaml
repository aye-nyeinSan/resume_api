steps:
  # Pull the previous image to prime the build cache (ignore failure on first build)
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: bash
    args:
      - '-c'
      - |
        docker pull asia-southeast1-docker.pkg.dev/test-app-rubi/resume-api/resume-api:latest || exit 0

  # Build using the previous image as cache, tag with both commit SHA and latest
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--cache-from'
      - 'asia-southeast1-docker.pkg.dev/test-app-rubi/resume-api/resume-api:latest'
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/test-app-rubi/resume-api/resume-api:$COMMIT_SHA'
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/test-app-rubi/resume-api/resume-api:latest'
      - '.'
    env:
      - 'DOCKER_BUILDKIT=1'

  # Push both tags to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'asia-southeast1-docker.pkg.dev/test-app-rubi/resume-api/resume-api'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'resume-api'
      - '--image'
      - 'asia-southeast1-docker.pkg.dev/test-app-rubi/resume-api/resume-api:$COMMIT_SHA'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--port'
      - '8080'

  # Clean up old images, keep only the one just deployed
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        IMAGE_PATH="asia-southeast1-docker.pkg.dev/test-app-rubi/resume-api/resume-api"
        gcloud artifacts docker images list "$$IMAGE_PATH" \
          --include-tags \
          --sort-by="~CREATE_TIME" \
          --format="value(version)" \
        | tail -n +2 \
        | while read -r DIGEST; do
            echo "Deleting old image: $${IMAGE_PATH}@$${DIGEST}"
            gcloud artifacts docker images delete "$${IMAGE_PATH}@$${DIGEST}" \
              --delete-tags --quiet || true
          done

images:
  - 'asia-southeast1-docker.pkg.dev/test-app-rubi/resume-api/resume-api:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY